<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana 1 - Detectives de la Verdad | UTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .modal-content {
            max-height: 92vh;
            overflow-y: auto;
        }
        
        @media (max-width: 640px) {
            .modal-content {
                max-height: 95vh;
                margin-top: auto;
                margin-bottom: auto;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="UTEL" class="h-10">
                <div>
                    <span class="text-emerald-500 font-bold text-base">SEMANA 1</span>
                    <h1 class="title-font text-2xl font-bold tracking-tighter">Detectives</h1>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="text-center mb-12">
            <h2 class="title-font text-4xl md:text-5xl font-bold">¿Puedes detectar la verdad?</h2>
            <p class="text-zinc-400 mt-3">3 escenarios reales</p>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6" id="scenarios-grid"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-lg modal-content">
            
            <div class="p-5 border-b border-zinc-800 flex items-center justify-between sticky top-0 bg-zinc-900">
                <div class="flex items-center gap-3">
                    <span id="modal-icon" class="text-4xl"></span>
                    <h3 id="modal-title" class="title-font text-xl font-bold"></h3>
                </div>
                <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>

            <div class="p-6">
                <div id="modal-image" class="w-full h-56 md:h-64 rounded-2xl overflow-hidden mb-6"></div>
                <p id="modal-situation" class="text-zinc-300 leading-relaxed"></p>
            </div>

            <div class="px-6 space-y-3 pb-6" id="options-container"></div>

            <div id="feedback-section" class="hidden p-6 border-t border-zinc-800">
                <div id="feedback-card" class="rounded-2xl p-6 mb-6"></div>
                
                <div class="flex gap-3">
                    <button onclick="shareWhatsApp()" 
                            class="flex-1 flex items-center justify-center gap-2 bg-green-600 py-4 rounded-2xl text-sm font-medium">
                        <i class="fa-brands fa-whatsapp text-xl"></i> WhatsApp
                    </button>
                    <button onclick="shareTwitter()" 
                            class="flex-1 flex items-center justify-center gap-2 bg-sky-500 py-4 rounded-2xl text-sm font-medium">
                        <i class="fa-brands fa-x-twitter text-xl"></i> X
                    </button>
                </div>
                
                <button onclick="nextScenario()" 
                        class="mt-4 w-full py-5 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-2xl">
                    Siguiente Escenario →
                </button>
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-zinc-500 text-sm border-t border-zinc-800">
        by Armando Sandoval Maravilla
    </footer>

    <script>
        let currentScenario = null;

        const scenarios = [
            {
                id: 1,
                title: "Estafa de Migración a Canadá",
                icon: "🇨🇦",
                image: "https://images.unsplash.com/photo-1544620347-c4fd70cbf0d3?w=800",
                situation: "En redes sociales circula un video viral con el mensaje “Emigrar fácil y rápido a Canadá” acompañado de promesas de trabajo y casa inmediata."
            },
            {
                id: 2,
                title: "Ley Anti-Stickers de Morena",
                icon: "📱",
                image: "https://images.unsplash.com/photo-1611162618071-6c3d6a4b4b4b?w=800",
                situation: "Se viraliza que un diputado de Morena propone penas de cárcel por crear o difundir memes y stickers."
            },
            {
                id: 3,
                title: "Meme sobre Claudia Sheinbaum",
                icon: "💡",
                image: "https://images.unsplash.com/photo-1605379399642-870262d3d051?w=800",
                situation: "Circula un meme sobre un comentario de la presidenta Claudia Sheinbaum acerca de ahorrar luz."
            }
        ];

        function renderScenarios() {
            const container = document.getElementById('scenarios-grid');
            container.innerHTML = scenarios.map(sc => `
                <div onclick="openScenario(${sc.id})" class="bg-zinc-900 border border-zinc-700 hover:border-emerald-500 rounded-3xl p-6 cursor-pointer transition-all active:scale-95">
                    <div class="text-5xl mb-4">${sc.icon}</div>
                    <h3 class="title-font text-xl font-bold mb-1">Escenario ${sc.id}</h3>
                    <p class="text-zinc-400 text-sm">${sc.title}</p>
                </div>
            `).join('');
        }

        function openScenario(id) {
            currentScenario = scenarios.find(s => s.id === id);
            document.getElementById('modal').classList.remove('hidden');
            
            document.getElementById('modal-icon').innerHTML = currentScenario.icon;
            document.getElementById('modal-title').textContent = currentScenario.title;
            document.getElementById('modal-image').innerHTML = `<img src="${currentScenario.image}" class="w-full h-full object-cover" alt="imagen">`;
            document.getElementById('modal-situation').textContent = currentScenario.situation;
            document.getElementById('feedback-section').classList.add('hidden');

            const options = [
                "Compartir inmediatamente con mis contactos",
                "Verificar en fuentes oficiales",
                "Ignorarlo"
            ];

            document.getElementById('options-container').innerHTML = options.map((text, i) => `
                <button onclick="selectOption(${i})" class="w-full p-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-left transition-all active:scale-95">
                    ${text}
                </button>
            `).join('');
        }

        function selectOption(choice) {
            const messages = [
                {msg: "❌ Difundir sin verificar puede reforzar fraudes.", color: "red"},
                {msg: "✅ ¡Excelente! Verificar fuentes oficiales es la mejor decisión.", color: "emerald"},
                {msg: "⚠️ No propagas el fraude, pero tampoco ayudas a otros.", color: "amber"}
            ];

            document.getElementById('feedback-card').innerHTML = `
                <div class="bg-${messages[choice].color}-900/30 border border-${messages[choice].color}-500 rounded-2xl p-5 text-lg">
                    ${messages[choice].msg}
                </div>
            `;
            document.getElementById('feedback-section').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function nextScenario() {
            closeModal();
            const nextId = currentScenario.id < 3 ? currentScenario.id + 1 : 1;
            setTimeout(() => openScenario(nextId), 300);
        }

        function shareWhatsApp() {
            const msg = "Completé los escenarios de Semana 1 - Detectives de la Verdad UTEL. ¡Cuidemos la información!";
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function shareTwitter() {
            const msg = "Terminé los escenarios de desinformación de la Semana 1 en UTEL";
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(msg)}`);
        }

        window.onload = renderScenarios;
    </script>
</body>
</html>
