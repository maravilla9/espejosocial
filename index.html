<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Semana 1 · Detectives de la Verdad · Utel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;}
.shell{max-width:420px;margin:0 auto;padding-bottom:30px;}
.bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0a0a0f;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:10;}
.bar-logo{height:30px;filter:brightness(0) invert(1);}
.bar-pill{background:linear-gradient(135deg,#6366f1,#a855f7);font-size:10px;font-weight:800;letter-spacing:1px;padding:5px 12px;border-radius:20px;}
.steps{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px 0;}
.step{width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,.1);transition:all .3s;}
.step.on{background:linear-gradient(90deg,#6366f1,#a855f7);width:52px;}
.step.done{background:rgba(99,102,241,.45);}
.card{margin:12px 12px 0;border-radius:20px;overflow:hidden;background:#13131a;border:1px solid rgba(255,255,255,.07);}
.img-box{position:relative;overflow:hidden;background:#0a0a0f;}
.img-bg-blur{position:absolute;inset:-30px;background-size:cover;background-position:center;filter:blur(22px);opacity:.5;transform:scale(1.1);}
.img-main{width:100%;display:block;position:relative;z-index:1;max-height:260px;object-fit:contain;}
.img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(19,19,26,.98) 100%);z-index:2;}
.img-tags{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:3;}
.tag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;backdrop-filter:blur(8px);}
.tag-n{background:rgba(10,10,15,.7);color:#94a3b8;border:1px solid rgba(255,255,255,.12);}
.tag-r{background:rgba(239,68,68,.85);color:#fff;}
.tag-o{background:rgba(249,115,22,.85);color:#fff;}
.tag-b{background:rgba(99,102,241,.85);color:#fff;}
.img-title{position:absolute;bottom:0;left:0;right:0;padding:12px 14px 14px;z-index:3;}
.img-title h2{font-size:16px;font-weight:800;line-height:1.25;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.sit{margin:12px 12px 0;padding:12px 13px;background:rgba(99,102,241,.09);border-radius:13px;border-left:3px solid #6366f1;}
.sit-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#818cf8;margin-bottom:6px;}
.sit-txt{font-size:13px;color:#94a3b8;line-height:1.65;}
.opts-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#374151;padding:10px 12px 6px;}
.opts{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px;}
.opt{width:100%;text-align:left;padding:12px 13px;border-radius:13px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:11px;transition:all .15s;-webkit-tap-highlight-color:transparent;line-height:1.4;}
.opt:active{transform:scale(.97);}
.opt:hover:not(:disabled){background:rgba(255,255,255,.07);}
.opt:disabled{cursor:default;transform:none;}
.ico{width:32px;height:32px;min-width:32px;border-radius:10px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:15px;}
.opt.ok{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.45);color:#86efac;}
.opt.ok .ico{background:rgba(34,197,94,.22);}
.opt.meh{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.45);color:#fde047;}
.opt.meh .ico{background:rgba(234,179,8,.22);}
.opt.no{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.45);color:#fca5a5;}
.opt.no .ico{background:rgba(239,68,68,.22);}
.opt.dim{opacity:.2;}
.fb{display:none;margin:0 12px 10px;padding:12px 13px;border-radius:13px;font-size:13px;font-weight:600;line-height:1.6;}
.fb.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.fb.meh{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25);color:#fde047;}
.fb.no{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.nxt{display:none;margin:0 12px 10px;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;width:calc(100% - 24px);cursor:pointer;letter-spacing:.3px;-webkit-tap-highlight-color:transparent;}
.nxt:active{opacity:.8;}
.sc-firma{text-align:center;font-size:10px;color:rgba(255,255,255,.12);padding:4px 12px 14px;font-weight:500;letter-spacing:.4px;}
.fin{display:none;padding:14px 12px;}
.fin-card{background:#13131a;border-radius:20px;border:1px solid rgba(255,255,255,.07);padding:28px 20px;text-align:center;}
.fin-em{font-size:56px;margin-bottom:12px;}
.fin-h{font-size:21px;font-weight:900;color:#f1f5f9;margin-bottom:4px;}
.fin-s{font-size:12px;color:#4b5563;margin-bottom:18px;}
.ring{width:110px;height:110px;margin:0 auto 14px;position:relative;}
.ring svg{transform:rotate(-90deg);}
.ring circle{fill:none;stroke:rgba(255,255,255,.06);stroke-width:9;}
.ring circle.arc{stroke:url(#g);stroke-width:9;stroke-linecap:round;stroke-dasharray:264;stroke-dashoffset:264;transition:stroke-dashoffset .9s cubic-bezier(.34,1.56,.64,1);}
.ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-big{font-size:28px;font-weight:900;color:#f1f5f9;line-height:1;}
.ring-lbl{font-size:10px;color:#4b5563;font-weight:600;margin-top:3px;}
.stars{font-size:26px;margin-bottom:12px;letter-spacing:4px;}
.fin-msg{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:20px;}
.rst{width:100%;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.rst:active{opacity:.8;}
.firma{margin:14px 0 0;text-align:center;padding:18px 14px;background:#13131a;border-radius:20px;border:1px solid rgba(255,255,255,.07);}
.firma img{height:26px;filter:brightness(0) invert(1);opacity:.45;display:block;margin:0 auto 10px;}
.firma-linea{width:40px;height:1px;background:rgba(255,255,255,.08);margin:10px auto;}
.firma p{font-size:12px;color:#374151;line-height:2.1;}
.firma .nombre{font-size:13px;font-weight:700;color:#6366f1;letter-spacing:.3px;}
.firma .cargo{font-size:11px;color:#4b5563;}
.firma .uni{font-size:11px;color:#4b5563;font-weight:600;}
</style>
</head>
<body>
<div class="shell">
  <div class="bar">
    <img class="bar-logo" src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Utel">
    <span class="bar-pill">SEMANA 1</span>
  </div>
  <div class="steps">
    <div class="step" id="s0"></div>
    <div class="step" id="s1"></div>
    <div class="step" id="s2"></div>
  </div>
  <div id="area"></div>
  <div class="fin" id="fin">
    <div class="fin-card">
      <div class="fin-em" id="fem">🎯</div>
      <div class="fin-h">¡Juego completado!</div>
      <div class="fin-s">Alfabetización Digital · Semana 1</div>
      <div class="ring">
        <svg width="110" height="110" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="42"/>
          <circle cx="50" cy="50" r="42" class="arc" id="arc"/>
        </svg>
        <div class="ring-num">
          <div class="ring-big" id="rnum">0/3</div>
          <div class="ring-lbl">correctas</div>
        </div>
      </div>
      <div class="stars" id="fstars">⭐</div>
      <div class="fin-msg" id="fmsg"></div>
      <button class="rst" onclick="restart()">🔄 Intentar de nuevo</button>
    </div>
    <div class="firma">
      <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Utel">
      <div class="firma-linea"></div>
      <p>
        <span class="nombre">Dr. Armando Sandoval Maravilla</span><br>
        <span class="cargo">Docente · Semana 1</span><br>
        <span class="uni">Universidad Utel</span>
      </p>
    </div>
  </div>
</div>
<script>
const DATA=[
  {num:"01",tag:"🚨 Estafa",tc:"tag-r",title:"Estafa de Migración a Canadá",img:"https://i.postimg.cc/3RZJD3hG/estafas.jpg",sit:"En redes sociales circula un video viral con el mensaje \u201cEmigrar f\u00e1cil y r\u00e1pido a Canad\u00e1\u201d con promesas de trabajo garantizado y casa inmediata.",opts:[{i:"📤",t:"Compartir de inmediato con mis contactos",k:"no",f:"❌ Difundir sin verificar ayuda a que m\u00e1s personas caigan en estafas."},{i:"🔍",t:"Verificar en fuentes oficiales (IRCC, Gobierno de Canad\u00e1)",k:"ok",f:"✅ \u00a1Correcto! Verificar fortalece el pensamiento cr\u00edtico y protege a las personas."},{i:"🙈",t:"Ignorarlo",k:"meh",f:"⚠️ Aceptable pero no ideal. No difundes el fraude, pero tampoco ayudas a otros a identificarlo."}]},
  {num:"02",tag:"⚖️ Pol\u00edtico",tc:"tag-o",title:"Ley Anti-Stickers de Morena",img:"https://i.postimg.cc/FRxsJhvL/morena.jpg",sit:"Se viraliza que un diputado de Morena propone penas de c\u00e1rcel por crear o difundir memes, stickers o gifs que da\u00f1en la reputaci\u00f3n de alguien.",opts:[{i:"😂",t:"Compartirlo como burla sin verificar",k:"no",f:"❌ Difundir sin verificar genera desinformaci\u00f3n, aunque sea en broma."},{i:"🔍",t:"Investigar si es real en el sitio oficial del Congreso",k:"ok",f:"✅ \u00a1Correcto! Confirmar antes de opinar o compartir es siempre lo mejor."},{i:"🙈",t:"Ignorarlo",k:"meh",f:"⚠️ Aceptable, pero pierdes la oportunidad de reflexionar sobre libertad de expresi\u00f3n."}]},
  {num:"03",tag:"💡 Viral",tc:"tag-b",title:"Meme sobre Claudia Sheinbaum",img:"https://i.postimg.cc/ZRLKyJm3/luz.jpg",sit:"Circula un meme sobre un supuesto comentario de la presidenta Claudia Sheinbaum sobre apagar luces o usar menos calentador para ahorrar energ\u00eda.",opts:[{i:"😆",t:"Re\u00edr y compartir el meme",k:"no",f:"❌ Compartir memes sin verificar contribuye a la desinformaci\u00f3n pol\u00edtica."},{i:"🔍",t:"Investigar si realmente lo dijo buscando la declaraci\u00f3n completa",k:"ok",f:"✅ \u00a1Correcto! Verificar fuentes oficiales evita caer en desinformaci\u00f3n."},{i:"🙈",t:"Ignorarlo",k:"meh",f:"⚠️ Aceptable. No lo viralizas, pero tampoco ayudas a distinguir lo verdadero de lo falso."}]}
];
let cur=0,score=0,answered=false;
function sfl(a){return[...a].sort(()=>Math.random()-.5);}
function dots(){for(let i=0;i<3;i++){const d=document.getElementById('s'+i);d.className='step'+(i<cur?' done':i===cur?' on':'');}}
function render(){
  if(cur>=3){showFin();return;}
  answered=false;dots();
  const d=DATA[cur],opts=sfl(d.opts);
  const area=document.getElementById('area');
  area._opts=opts;
  area.innerHTML=`
  <div class="card">
    <div class="img-box">
      <div class="img-bg-blur" style="background-image:url('${d.img}')"></div>
      <img class="img-main" src="${d.img}" alt="${d.title}">
      <div class="img-overlay"></div>
      <div class="img-tags">
        <span class="tag tag-n">Escenario ${d.num}</span>
        <span class="tag ${d.tc}">${d.tag}</span>
      </div>
      <div class="img-title"><h2>${d.title}</h2></div>
    </div>
    <div class="sit"><div class="sit-lbl">📋 Situación</div><div class="sit-txt">${d.sit}</div></div>
    <div class="opts-lbl">👇 ¿Qué harías tú?</div>
    <div class="opts">${opts.map((o,i)=>`<button class="opt" onclick="pick(${i})" id="o${i}"><span class="ico">${o.i}</span><span>${o.t}</span></button>`).join('')}</div>
    <div class="fb" id="fb"></div>
    <button class="nxt" id="nxt" onclick="next()">${cur<2?'Siguiente escenario →':'Ver mis resultados →'}</button>
    <div class="sc-firma">Material didáctico · Universidad Utel · Dr. Armando Sandoval Maravilla</div>
  </div>`;
}
function pick(i){
  if(answered)return;answered=true;
  const opts=document.getElementById('area')._opts;const c=opts[i];
  if(c.k==='ok')score++;
  for(let j=0;j<opts.length;j++){const b=document.getElementById('o'+j);b.disabled=true;j===i?b.classList.add(c.k):b.classList.add('dim');}
  const fb=document.getElementById('fb');fb.textContent=c.f;fb.className='fb '+c.k;fb.style.display='block';
  document.getElementById('nxt').style.display='block';
}
function next(){cur++;render();}
function showFin(){
  document.getElementById('area').innerHTML='';
  document.querySelector('.steps').style.display='none';
  document.getElementById('fin').style.display='block';
  document.getElementById('rnum').textContent=score+'/3';
  document.getElementById('fem').textContent=['😓','🤔','🏆'][score];
  document.getElementById('fstars').textContent=['⭐','⭐⭐','⭐⭐⭐'][score];
  document.getElementById('fmsg').textContent=['Sigue practicando. El pensamiento crítico se entrena todos los días. ¡Inténtalo de nuevo!','Vas por buen camino. Siempre verifica antes de compartir cualquier información.','¡Excelente! Eres un ejemplo de ciudadanía digital responsable.'][score];
  setTimeout(()=>{document.getElementById('arc').style.strokeDashoffset=264-(264*(score/3));},300);
}
function restart(){
  cur=0;score=0;answered=false;
  document.getElementById('fin').style.display='none';
  document.querySelector('.steps').style.display='flex';
  render();
}
render();
</script>
</body>
</html>
