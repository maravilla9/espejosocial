<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Semana 1 · Detectives de la Verdad · Utel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;height:100%;}
.shell{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* TOP BAR */
.bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0a0a0f;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.bar-logo{height:28px;filter:brightness(0) invert(1);}
.bar-pill{background:linear-gradient(135deg,#6366f1,#a855f7);font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 10px;border-radius:20px;}

/* STEP DOTS */
.steps{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px 0;flex-shrink:0;}
.step{width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,.1);transition:all .3s;}
.step.on{background:linear-gradient(90deg,#6366f1,#a855f7);width:48px;}
.step.done{background:rgba(99,102,241,.4);}

/* CARD */
.card{margin:10px 12px 0;border-radius:18px;overflow:hidden;background:#13131a;border:1px solid rgba(255,255,255,.07);}

/* IMAGE */
.img-box{position:relative;height:170px;overflow:hidden;}
.img-box img{width:100%;height:100%;object-fit:cover;display:block;}
.img-fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,15,0) 30%,rgba(10,10,15,.98) 100%);}
.img-tags{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;}
.tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.5px;backdrop-filter:blur(6px);}
.tag-n{background:rgba(10,10,15,.6);color:#94a3b8;border:1px solid rgba(255,255,255,.1);}
.tag-r{background:rgba(239,68,68,.75);color:#fecaca;}
.tag-o{background:rgba(249,115,22,.75);color:#fed7aa;}
.tag-b{background:rgba(99,102,241,.75);color:#c7d2fe;}
.img-title{position:absolute;bottom:0;left:0;right:0;padding:10px 12px 12px;}
.img-title h2{font-size:15px;font-weight:800;line-height:1.2;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.6);}

/* SITUATION */
.sit{margin:10px 12px;padding:10px 12px;background:rgba(99,102,241,.08);border-radius:12px;border-left:3px solid #6366f1;}
.sit-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#818cf8;margin-bottom:5px;}
.sit-txt{font-size:12px;color:#94a3b8;line-height:1.6;}

/* OPTIONS */
.opts-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#374151;padding:8px 12px 5px;}
.opts{padding:0 12px 12px;display:flex;flex-direction:column;gap:7px;}
.opt{width:100%;text-align:left;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:10px;transition:all .15s;-webkit-tap-highlight-color:transparent;line-height:1.35;}
.opt:active{transform:scale(.97);}
.opt:hover:not(:disabled){background:rgba(255,255,255,.07);}
.opt:disabled{cursor:default;transform:none;}
.ico{width:30px;height:30px;min-width:30px;border-radius:9px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:14px;}
.opt.ok{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#86efac;}
.opt.ok .ico{background:rgba(34,197,94,.2);}
.opt.meh{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.4);color:#fde047;}
.opt.meh .ico{background:rgba(234,179,8,.2);}
.opt.no{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:#fca5a5;}
.opt.no .ico{background:rgba(239,68,68,.2);}
.opt.dim{opacity:.2;}

/* FEEDBACK */
.fb{display:none;margin:0 12px 10px;padding:11px 13px;border-radius:12px;font-size:12px;font-weight:600;line-height:1.55;}
.fb.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.fb.meh{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25);color:#fde047;}
.fb.no{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}

/* NEXT */
.nxt{display:none;margin:0 12px 14px;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;width:calc(100% - 24px);cursor:pointer;letter-spacing:.3px;-webkit-tap-highlight-color:transparent;}
.nxt:active{opacity:.8;}

/* FINAL */
.fin{display:none;padding:14px 12px;}
.fin-card{background:#13131a;border-radius:18px;border:1px solid rgba(255,255,255,.07);padding:24px 18px;text-align:center;}
.fin-em{font-size:52px;margin-bottom:10px;}
.fin-h{font-size:20px;font-weight:900;color:#f1f5f9;margin-bottom:3px;}
.fin-s{font-size:12px;color:#4b5563;margin-bottom:16px;}
.ring{width:100px;height:100px;margin:0 auto 12px;position:relative;}
.ring svg{transform:rotate(-90deg);}
.ring circle{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8;}
.ring circle.arc{stroke:url(#g);stroke-width:8;stroke-linecap:round;stroke-dasharray:264;stroke-dashoffset:264;transition:stroke-dashoffset .9s cubic-bezier(.34,1.56,.64,1);}
.ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-big{font-size:26px;font-weight:900;color:#f1f5f9;line-height:1;}
.ring-lbl{font-size:10px;color:#4b5563;font-weight:600;margin-top:2px;}
.stars{font-size:24px;margin-bottom:10px;letter-spacing:3px;}
.fin-msg{font-size:13px;color:#6b7280;line-height:1.65;margin-bottom:18px;}
.rst{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.rst:active{opacity:.8;}

/* FIRMA */
.firma{margin:10px 0 20px;text-align:center;padding:14px;background:#13131a;border-radius:18px;border:1px solid rgba(255,255,255,.06);}
.firma img{height:22px;filter:brightness(0) invert(1);opacity:.4;margin-bottom:6px;}
.firma p{font-size:11px;color:#374151;line-height:1.8;}
.firma strong{color:#4b5563;}
</style>
</head>
<body>
<div class="shell">
  <div class="bar">
    <img class="bar-logo" src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Utel">
    <span class="bar-pill">SEMANA 1</span>
  </div>

  <div class="steps">
    <div class="step" id="s0"></div>
    <div class="step" id="s1"></div>
    <div class="step" id="s2"></div>
  </div>

  <div id="area"></div>

  <div class="fin" id="fin">
    <div class="fin-card">
      <div class="fin-em" id="fem">🎯</div>
      <div class="fin-h">¡Juego completado!</div>
      <div class="fin-s">Alfabetización Digital · Semana 1</div>
      <div class="ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="42"/>
          <circle cx="50" cy="50" r="42" class="arc" id="arc"/>
        </svg>
        <div class="ring-num">
          <div class="ring-big" id="rnum">0/3</div>
          <div class="ring-lbl">correctas</div>
        </div>
      </div>
      <div class="stars" id="fstars">⭐</div>
      <div class="fin-msg" id="fmsg"></div>
      <button class="rst" onclick="restart()">🔄 Intentar de nuevo</button>
    </div>
    <div class="firma">
      <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Utel"><br>
      <p><strong>Universidad Utel</strong><br>Docente: Armando Sandoval Maravilla</p>
    </div>
  </div>
</div>

<script>
const DATA=[
  {num:"01",tag:"🚨 Estafa",tc:"tag-r",
   title:"Estafa de Migración a Canadá",
   img:"https://i.postimg.cc/3RZJD3hG/estafas.jpg",
   sit:"En redes sociales circula un video viral con el mensaje \u201cEmigrar fácil y rápido a Canadá\u201d con promesas de trabajo garantizado y casa inmediata.",
   opts:[
    {i:"📤",t:"Compartir de inmediato con mis contactos",k:"no",f:"❌ Difundir sin verificar ayuda a que más personas caigan en estafas."},
    {i:"🔍",t:"Verificar en fuentes oficiales (IRCC, Gobierno de Canadá)",k:"ok",f:"✅ ¡Correcto! Verificar fortalece el pensamiento crítico y protege a las personas."},
    {i:"🙈",t:"Ignorarlo",k:"meh",f:"⚠️ Aceptable, pero no ideal. No difundes el fraude, pero tampoco ayudas a otros a identificarlo."}
  ]},
  {num:"02",tag:"⚖️ Político",tc:"tag-o",
   title:"Ley Anti-Stickers de Morena",
   img:"https://i.postimg.cc/FRxsJhvL/morena.jpg",
   sit:"Se viraliza que un diputado de Morena propone penas de cárcel por crear o difundir memes, stickers o gifs que dañen la reputación de alguien.",
   opts:[
    {i:"😂",t:"Compartirlo como burla sin verificar",k:"no",f:"❌ Difundir sin verificar genera desinformación, aunque sea en broma."},
    {i:"🔍",t:"Investigar si es real en el sitio oficial del Congreso",k:"ok",f:"✅ ¡Correcto! Confirmar antes de opinar o compartir es siempre lo mejor."},
    {i:"🙈",t:"Ignorarlo",k:"meh",f:"⚠️ Aceptable, pero pierdes la oportunidad de reflexionar sobre libertad de expresión."}
  ]},
  {num:"03",tag:"💡 Viral",tc:"tag-b",
   title:"Meme sobre Claudia Sheinbaum",
   img:"https://i.postimg.cc/ZRLKyJm3/luz.jpg",
   sit:"Circula un meme sobre un supuesto comentario de la presidenta Claudia Sheinbaum sobre apagar luces o usar menos calentador para ahorrar energía.",
   opts:[
    {i:"😆",t:"Reír y compartir el meme",k:"no",f:"❌ Compartir memes sin verificar contribuye a la desinformación política."},
    {i:"🔍",t:"Investigar si realmente lo dijo buscando la declaración completa",k:"ok",f:"✅ ¡Correcto! Verificar fuentes oficiales evita caer en desinformación."},
    {i:"🙈",t:"Ignorarlo",k:"meh",f:"⚠️ Aceptable. No lo viralizas, pero tampoco ayudas a otros a distinguir lo verdadero de lo falso."}
  ]}
];

let cur=0,score=0,answered=false;

function sfl(a){return[...a].sort(()=>Math.random()-.5);}

function dots(){
  for(let i=0;i<3;i++){
    const d=document.getElementById('s'+i);
    d.className='step'+(i<cur?' done':i===cur?' on':'');
  }
}

function render(){
  if(cur>=3){showFin();return;}
  answered=false;dots();
  const d=DATA[cur],opts=sfl(d.opts);
  document.getElementById('area')._opts=opts;
  document.getElementById('area').innerHTML=`
  <div class="card">
    <div class="img-box">
      <img src="${d.img}" alt="${d.title}">
      <div class="img-fade"></div>
      <div class="img-tags">
        <span class="tag tag-n">Escenario ${d.num}</span>
        <span class="tag ${d.tc}">${d.tag}</span>
      </div>
      <div class="img-title"><h2>${d.title}</h2></div>
    </div>
    <div class="sit">
      <div class="sit-lbl">📋 Situación</div>
      <div class="sit-txt">${d.sit}</div>
    </div>
    <div class="opts-lbl">👇 ¿Qué harías tú?</div>
    <div class="opts">
      ${opts.map((o,i)=>`<button class="opt" onclick="pick(${i})" id="o${i}"><span class="ico">${o.i}</span><span>${o.t}</span></button>`).join('')}
    </div>
    <div class="fb" id="fb"></div>
    <button class="nxt" id="nxt" onclick="next()">${cur<2?'Siguiente escenario →':'Ver mis resultados →'}</button>
  </div>`;
}

function pick(i){
  if(answered)return;
  answered=true;
  const opts=document.getElementById('area')._opts;
  const c=opts[i];
  if(c.k==='ok')score++;
  for(let j=0;j<opts.length;j++){
    const b=document.getElementById('o'+j);
    b.disabled=true;
    j===i?b.classList.add(c.k):b.classList.add('dim');
  }
  const fb=document.getElementById('fb');
  fb.textContent=c.f;fb.className='fb '+c.k;fb.style.display='block';
  document.getElementById('nxt').style.display='block';
}

function next(){cur++;render();}

function showFin(){
  document.getElementById('area').innerHTML='';
  document.querySelector('.steps').style.display='none';
  const fin=document.getElementById('fin');
  fin.style.display='block';
  document.getElementById('rnum').textContent=score+'/3';
  document.getElementById('fem').textContent=['😓','🤔','🏆'][score];
  document.getElementById('fstars').textContent=['⭐','⭐⭐','⭐⭐⭐'][score];
  document.getElementById('fmsg').textContent=[
    'Sigue practicando. El pensamiento crítico se entrena todos los días. ¡Inténtalo de nuevo!',
    'Vas por buen camino. Siempre verifica antes de compartir cualquier información.',
    '¡Excelente! Eres un ejemplo de ciudadanía digital responsable.'
  ][score];
  setTimeout(()=>{
    document.getElementById('arc').style.strokeDashoffset=264-(264*(score/3));
  },300);
}

function restart(){
  cur=0;score=0;answered=false;
  document.getElementById('fin').style.display='none';
  document.querySelector('.steps').style.display='flex';
  render();
}

render();
</script>
</body>
</html>
