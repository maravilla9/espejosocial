<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana 1 - Detectives de la Verdad | UTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .modal-content {
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Logo UTEL" class="h-14">
                <div>
                    <span class="text-emerald-500 font-bold tracking-widest">SEMANA 1</span>
                    <h1 class="title-font text-3xl font-bold tracking-tighter">Detectives de la Verdad</h1>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h2 class="title-font text-5xl font-bold mb-4">Enfrenta la desinformación</h2>
            <p class="text-zinc-400 text-xl">3 escenarios reales • Semana 1</p>
        </div>

        <div class="grid md:grid-cols-3 gap-8" id="scenarios-grid"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-xl modal-content">
            
            <div class="p-6 border-b border-zinc-800 flex items-center justify-between sticky top-0 bg-zinc-900 z-10">
                <div class="flex items-center gap-3">
                    <span id="modal-icon" class="text-3xl"></span>
                    <h3 id="modal-title" class="title-font text-2xl font-bold"></h3>
                </div>
                <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
            </div>

            <div class="p-8">
                <div id="modal-image" class="w-full h-56 bg-zinc-800 rounded-2xl mb-8 flex items-center justify-center text-7xl overflow-hidden"></div>
                
                <p id="modal-situation" class="text-zinc-300 leading-relaxed text-[17px]"></p>

                <div class="mt-10 space-y-4" id="options-container"></div>
            </div>

            <!-- Feedback -->
            <div id="feedback-section" class="hidden p-8 border-t border-zinc-800 bg-zinc-950">
                <div id="feedback-card" class="rounded-2xl p-6"></div>
                <button onclick="nextScenario()" 
                        class="mt-6 w-full py-5 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-2xl text-lg transition-all">
                    Siguiente Escenario →
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-black py-8 text-center text-zinc-500 text-sm border-t border-zinc-800">
        by Armando Sandoval Maravilla
    </footer>

    <script>
        let currentScenario = null;

        const scenarios = [
            {
                id: 1,
                title: "Estafa de Migración a Canadá",
                icon: "🇨🇦",
                image: "https://images.unsplash.com/photo-1504608524841-9e4f4a5b7c5e?w=800",
                situation: "En redes sociales circula un video viral con el mensaje “Emigrar fácil y rápido a Canadá” acompañado de la bandera canadiense y promesas de trabajo garantizado y casa inmediata.",
                options: [
                    {text: "Compartir inmediatamente con mis contactos", feedback: "❌ Difundir sin verificar puede reforzar fraudes y poner en riesgo a otros.", score: -10, correct: false},
                    {text: "Verificar en fuentes oficiales", feedback: "✅ ¡Excelente! Consultar fuentes oficiales fortalece tu pensamiento crítico y protege tu seguridad.", score: 30, correct: true},
                    {text: "Ignorarlo", feedback: "⚠️ No contribuyes al fraude, pero tampoco ayudas a otros.", score: 0, correct: false}
                ]
            },
            {
                id: 2,
                title: "Ley Anti-Stickers de Morena",
                icon: "📱",
                image: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=800",
                situation: "Se viraliza la noticia de que un diputado de Morena propone penas de cárcel por crear o difundir memes, stickers o gifs que dañen la reputación, incluso sátira política.",
                options: [
                    {text: "Compartir como burla", feedback: "❌ Difundir sin contexto puede generar miedo o desinformación.", score: -10, correct: false},
                    {text: "Investigar si la iniciativa es real", feedback: "✅ Muy bien. Confirmar en fuentes oficiales te permite opinar con fundamento.", score: 30, correct: true},
                    {text: "Ignorarlo", feedback: "⚠️ Evitas viralizarlo, pero pierdes la oportunidad de reflexionar sobre libertad de expresión.", score: 0, correct: false}
                ]
            },
            {
                id: 3,
                title: "Meme sobre Claudia Sheinbaum y el ahorro de luz",
                icon: "💡",
                image: "https://images.unsplash.com/photo-1605379399642-870262d3d051?w=800",
                situation: "Circula un meme sobre un comentario de la presidenta Claudia Sheinbaum acerca de apagar las luces o el uso del calentador solar.",
                options: [
                    {text: "Reír y compartir", feedback: "❌ Difundir memes sin verificar puede reforzar la desinformación.", score: -10, correct: false},
                    {text: "Investigar si realmente lo dijo", feedback: "✅ Correcto. Verificar declaraciones oficiales evita que los memes generen desinformación.", score: 30, correct: true},
                    {text: "Ignorarlo", feedback: "⚠️ No contribuyes a la viralización, pero tampoco ayudas a otros.", score: 0, correct: false}
                ]
            }
        ];

        function renderScenarios() {
            const container = document.getElementById('scenarios-grid');
            container.innerHTML = scenarios.map(sc => `
                <div onclick="openScenario(${sc.id})" class="bg-zinc-900 border border-zinc-700 hover:border-emerald-500 rounded-3xl p-8 cursor-pointer transition-all hover:scale-105">
                    <div class="text-6xl mb-4">${sc.icon}</div>
                    <h3 class="title-font text-2xl font-bold mb-3">Escenario ${sc.id}</h3>
                    <p class="text-zinc-400">${sc.title}</p>
                </div>
            `).join('');
        }

        function openScenario(id) {
            currentScenario = scenarios.find(s => s.id === id);
            if (!currentScenario) return;

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-icon').textContent = currentScenario.icon;
            document.getElementById('modal-title').textContent = currentScenario.title;
            
            // Imagen real
            document.getElementById('modal-image').innerHTML = `<img src="${currentScenario.image}" class="w-full h-full object-cover rounded-2xl" alt="escenario">`;
            
            document.getElementById('modal-situation').textContent = currentScenario.situation;
            document.getElementById('feedback-section').classList.add('hidden');

            const optionsHTML = currentScenario.options.map((opt, i) => `
                <button onclick="selectOption(${i})" class="w-full text-left p-6 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-emerald-500 rounded-2xl transition-all text-lg">
                    ${opt.text}
                </button>
            `).join('');
            
            document.getElementById('options-container').innerHTML = optionsHTML;
        }

        function selectOption(index) {
            const opt = currentScenario.options[index];
            const feedbackHTML = `
                <div class="${opt.correct ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-red-900/30 border border-red-500'} rounded-2xl p-6">
                    <p class="text-lg">${opt.feedback}</p>
                </div>
            `;
            document.getElementById('feedback-card').innerHTML = feedbackHTML;
            document.getElementById('feedback-section').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function nextScenario() {
            closeModal();
            const nextId = currentScenario.id < 3 ? currentScenario.id + 1 : 1;
            setTimeout(() => openScenario(nextId), 300);
        }

        window.onload = renderScenarios;
    </script>
</body>
</html>
